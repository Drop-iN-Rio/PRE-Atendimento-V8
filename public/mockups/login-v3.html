<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Hierarquia em Etapas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      min-height: 100%;
    }

    .card {
      width: 380px;
      padding: 2.25rem 2rem 2rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    /* CABEÇALHO MINIMALISTA */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .logo-text {
      font-size: 0.7rem;
      font-weight: 800;
      color: #475569;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .mode-pill {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.25);
      color: #818cf8;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* TÍTULO */
    .page-title {
      font-size: 2rem;
      font-weight: 900;
      color: #f1f5f9;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .page-title span {
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-sub {
      font-size: 0.8rem;
      color: #475569;
      margin-bottom: 2rem;
    }

    /* CAMPOS COM NUMERAÇÃO */
    .step-field {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.25rem;
      position: relative;
    }

    .step-field + .step-field {
      margin-top: 0.25rem;
    }

    .step-num-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 0.2rem;
    }

    .step-num {
      font-size: 1.5rem;
      font-weight: 900;
      color: #334155;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.04em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      width: 36px;
      text-align: center;
    }

    .step-num.active { color: #6366f1; }

    .step-line {
      width: 1px;
      flex: 1;
      background: #1e3a5f;
      margin-top: 4px;
      margin-bottom: -16px;
      min-height: 40px;
    }

    .step-content { flex: 1; padding-bottom: 1.5rem; }

    .step-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    .step-label.active { color: #818cf8; }

    input {
      width: 100%;
      font-size: 0.95rem;
      padding: 0.8rem 1rem;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #334155; }

    input:focus { border-color: #6366f1; }

    /* ETAPA 3: BOTÃO */
    .step-action {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .step-num-empty {
      width: 36px;
      text-align: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      height: 52px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
    }

    .btn-arrow {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }

    /* FOOTER */
    .footer {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      font-size: 0.75rem;
      color: #475569;
    }

    .footer-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
    }

    .tab-toggle {
      display: flex;
      background: #0f172a;
      border-radius: 8px;
      padding: 3px;
    }

    .t-btn {
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #475569;
      cursor: pointer;
    }

    .t-btn.active {
      background: #1e293b;
      color: #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-text">PRE-Atendimento</div>
      <div class="mode-pill">Evolution GO</div>
    </div>

    <div class="page-title">
      <span>Entre</span> na<br/>sua conta
    </div>
    <div class="page-sub">Acesso ao painel de instâncias</div>

    <!-- ETAPA 01 -->
    <div class="step-field">
      <div class="step-num-col">
        <div class="step-num active">01</div>
        <div class="step-line"></div>
      </div>
      <div class="step-content">
        <div class="step-label active">Seu e-mail</div>
        <input type="email" placeholder="seuemail@aqui.com" />
      </div>
    </div>

    <!-- ETAPA 02 -->
    <div class="step-field">
      <div class="step-num-col">
        <div class="step-num">02</div>
        <div class="step-line" style="background: transparent"></div>
      </div>
      <div class="step-content" style="padding-bottom: 0.5rem">
        <div class="step-label">Sua senha</div>
        <input type="password" placeholder="••••••••" />
      </div>
    </div>

    <!-- AÇÃO -->
    <div class="step-action" style="margin-top: 1.25rem">
      <div class="step-num-empty">→</div>
      <button class="btn">
        <span>Entrar agora</span>
        <span class="btn-arrow">↗</span>
      </button>
    </div>

    <div class="footer">
      <span class="footer-link">Sem conta? <a href="#">Criar acesso</a></span>
      <div class="tab-toggle">
        <div class="t-btn active">Entrar</div>
        <div class="t-btn">Registrar</div>
      </div>
    </div>
  </div>
</body>
</html>
